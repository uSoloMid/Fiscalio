[supervisord]
nodaemon=true
user=root

[program:php-fpm]
command=php-fpm
autostart=true
autorestart=true
priority=10

[program:nginx]
command=nginx -g "daemon off;"
autostart=true
autorestart=true
priority=20

[program:scheduler]
command=php /var/www/artisan schedule:work
autostart=true
autorestart=true
priority=40
redirect_stderr=true
stdout_logfile=/var/www/storage/logs/scheduler.log
